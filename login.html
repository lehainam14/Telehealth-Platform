<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Telehealth Platform</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <header class="ym-header">
    <div class="ym-top container">
      <a class="ym-brand" href="home.html" aria-label="Trang chủ">
        <img src="images/logo.png" alt="UMC Care" />
        Telehealth Platform
      </a>

      <nav class="ym-nav" aria-label="Điều hướng">
        <a class="ym-navLink" data-page="home" href="home.html">Trang chủ</a>
        <a class="ym-navLink" data-page="notifications" href="notifications.html">Thông báo</a>
      </nav>

      <a class="ym-login" href="login.html">Đăng nhập</a>
    </div>
  </header>

  <main class="container auth-main">
    <section class="auth-card" aria-label="Biểu mẫu đăng nhập">
      <h1 class="auth-title">Đăng nhập</h1>
      <p class="auth-sub">Đăng nhập để xem hồ sơ cá nhân của bạn.</p>

      <div id="login-error" class="auth-error hidden" role="alert"></div>

      <form id="login-form">
        <div class="auth-group">
          <label class="auth-label" for="email">Email</label>
          <input class="auth-input" id="email" name="email" type="email" placeholder="patient@telehealth.vn" required />
        </div>

        <div class="auth-group">
          <label class="auth-label" for="password">Mật khẩu</label>
          <input class="auth-input" id="password" name="password" type="password" placeholder="Nhập mật khẩu" required />
        </div>

        <button class="auth-submit" type="submit">Đăng nhập</button>
      </form>

      <p class="auth-cred">Tài khoản mẫu: patient@telehealth.vn | Mật khẩu: 123456</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
